# Let's Encrypt production ACME issuer. A staging issuer was used first to
# validate the HTTP-01 flow end-to-end (avoids burning production's stricter
# rate limits on a broken config) — confirmed working, then switched over.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: konradky@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
