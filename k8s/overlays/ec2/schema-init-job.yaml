# RDS starts empty — Terraform can't run SQL (terraform/modules/rds/main.tf).
# Bootstraps the schema once via the same SQL used to seed local Postgres
# (k8s/base/postgres-configmap.yaml). Safe to re-run: every statement is
# CREATE ... IF NOT EXISTS.
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-init
  namespace: pugetscope
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: schema-init
          image: postgis/postgis:16-3.4
          command: ["sh", "-c", "psql \"$(DATABASE_URL)\" -v ON_ERROR_STOP=1 -f /schema/001_schema.sql"]
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_DB } }
            - name: POSTGRES_HOST
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_HOST } }
            - name: POSTGRES_PORT
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_PORT } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          volumeMounts:
            - name: schema
              mountPath: /schema
      volumes:
        - name: schema
          configMap:
            name: postgres-init
