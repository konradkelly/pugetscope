# Local k3d dev environment — in-cluster Postgres/Redis (datastores
# component) and the k3d-registry image references.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pugetscope

resources:
  - ../../base

components:
  - ../../base/datastores

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: datastore-config
    literals:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379

images:
  - name: pugetscope/api
    newName: pugetscope-registry:5000/pugetscope-api
    newTag: latest
  - name: pugetscope/ingestion
    newName: pugetscope-registry:5000/pugetscope-ingestion
    newTag: latest
  - name: pugetscope/websocket
    newName: pugetscope-registry:5000/pugetscope-websocket
    newTag: latest
  - name: pugetscope/frontend
    newName: pugetscope-registry:5000/pugetscope-frontend
    newTag: latest
