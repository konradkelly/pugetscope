apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  namespace: pugetscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
        - name: websocket
          image: pugetscope/websocket:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: datastore-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: datastore-config, key: REDIS_PORT } }
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)"
            - name: CORS_ORIGIN
              value: "http://pugetscope.127.0.0.1.nip.io:8081"
          readinessProbe:
            httpGet: { path: /healthz, port: 3001 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: pugetscope
spec:
  selector:
    app: websocket
  ports:
    - port: 3001
      targetPort: 3001
