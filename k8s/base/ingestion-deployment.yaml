apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: pugetscope
spec:
  replicas: 1 # exactly one poller — see docs/SPEC.md §5, never scale this out
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: pugetscope/ingestion:latest
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_DB } }
            - name: POSTGRES_HOST
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_HOST } }
            - name: POSTGRES_PORT
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_PORT } }
            - name: POSTGRES_SSL
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_SSL } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: datastore-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: datastore-config, key: REDIS_PORT } }
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)"
            - name: OPENSKY_CLIENT_ID
              valueFrom: { secretKeyRef: { name: opensky-credentials, key: OPENSKY_CLIENT_ID } }
            - name: OPENSKY_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: opensky-credentials, key: OPENSKY_CLIENT_SECRET } }
            - name: POLL_INTERVAL_MS
              value: "30000"
            - name: AERODATABOX_API_KEY
              valueFrom: { secretKeyRef: { name: aerodatabox-credentials, key: AERODATABOX_API_KEY } }
            - name: FIDS_AIRPORT_ICAO
              value: "KSEA"
            - name: FIDS_REFRESH_INTERVAL_MS
              value: "1800000" # 30 min — safe under the RapidAPI Pro budget (docs/SPEC.md §12)
