apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pugetscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: pugetscope/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_DB } }
            - name: POSTGRES_HOST
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_HOST } }
            - name: POSTGRES_PORT
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_PORT } }
            - name: POSTGRES_SSL
              valueFrom: { configMapKeyRef: { name: datastore-config, key: POSTGRES_SSL } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: datastore-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: datastore-config, key: REDIS_PORT } }
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)"
            - name: CORS_ORIGIN
              value: "http://pugetscope.127.0.0.1.nip.io:8081"
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pugetscope
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
