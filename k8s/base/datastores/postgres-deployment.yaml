apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pugetscope
spec:
  replicas: 1
  strategy:
    type: Recreate # single ReadWriteOnce volume — never run 2 postgres pods at once
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata # avoid postgres complaining about lost+found in the volume root
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pugetscope
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
